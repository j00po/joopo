name: Plugin JoopoHub Release

on:
  workflow_dispatch:
    inputs:
      publish_scope:
        description: Publish the selected plugins or all JoopoHub-publishable plugins from the workflow ref
        required: true
        default: selected
        type: choice
        options:
          - selected
          - all-publishable
      plugins:
        description: Comma-separated plugin package names to publish when publish_scope=selected
        required: false
        type: string
      ref:
        description: Commit SHA on main or a release branch to publish from; defaults to the workflow ref
        required: false
        default: ""
        type: string

concurrency:
  group: plugin-joopohub-release-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24.x"
  PNPM_VERSION: "10.32.1"
  JOOPOHUB_REGISTRY: "https://joopohub.ai"
  JOOPOHUB_REPOSITORY: "joopo/joopohub"
  # Pinned to a reviewed JoopoHub commit so release behavior stays reproducible.
  JOOPOHUB_REF: "facf20ceb6cc459e2872d941e71335a784bbc55c"

jobs:
  preview_plugins_joopohub:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ref_revision: ${{ steps.ref.outputs.sha }}
      has_candidates: ${{ steps.plan.outputs.has_candidates }}
      candidate_count: ${{ steps.plan.outputs.candidate_count }}
      skipped_published_count: ${{ steps.plan.outputs.skipped_published_count }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "false"

      - name: Resolve checked-out ref
        id: ref
        env:
          TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || '' }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main \
            '+refs/heads/release/*:refs/remotes/origin/release/*'
          if [[ -n "${TARGET_REF}" ]]; then
            if git rev-parse --verify --quiet "${TARGET_REF}^{commit}" >/dev/null; then
              target_sha="$(git rev-parse "${TARGET_REF}^{commit}")"
            elif git rev-parse --verify --quiet "origin/${TARGET_REF}^{commit}" >/dev/null; then
              target_sha="$(git rev-parse "origin/${TARGET_REF}^{commit}")"
            else
              echo "Unable to resolve requested publish ref: ${TARGET_REF}" >&2
              exit 1
            fi
            git checkout --detach "${target_sha}"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate ref is on main or a release branch
        run: |
          set -euo pipefail
          if git merge-base --is-ancestor HEAD origin/main; then
            exit 0
          fi
          while IFS= read -r release_ref; do
            if git merge-base --is-ancestor HEAD "${release_ref}"; then
              exit 0
            fi
          done < <(git for-each-ref --format='%(refname)' refs/remotes/origin/release)
          echo "Plugin JoopoHub publishes must target a commit reachable from main or release/*." >&2
          exit 1

      - name: Validate publishable plugin metadata
        env:
          PUBLISH_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_scope || '' }}
          RELEASE_PLUGINS: ${{ github.event_name == 'workflow_dispatch' && inputs.plugins || '' }}
          BASE_REF: ${{ github.event_name != 'workflow_dispatch' && github.event.before || '' }}
          HEAD_REF: ${{ steps.ref.outputs.sha }}
        run: |
          set -euo pipefail
          if [[ -n "${PUBLISH_SCOPE}" ]]; then
            release_args=(--selection-mode "${PUBLISH_SCOPE}")
            if [[ -n "${RELEASE_PLUGINS}" ]]; then
              release_args+=(--plugins "${RELEASE_PLUGINS}")
            fi
            pnpm release:plugins:joopohub:check -- "${release_args[@]}"
          elif [[ -n "${BASE_REF}" ]]; then
            pnpm release:plugins:joopohub:check -- --base-ref "${BASE_REF}" --head-ref "${HEAD_REF}"
          else
            pnpm release:plugins:joopohub:check
          fi

      - name: Resolve plugin release plan
        id: plan
        env:
          PUBLISH_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_scope || '' }}
          RELEASE_PLUGINS: ${{ github.event_name == 'workflow_dispatch' && inputs.plugins || '' }}
          BASE_REF: ${{ github.event_name != 'workflow_dispatch' && github.event.before || '' }}
          HEAD_REF: ${{ steps.ref.outputs.sha }}
          JOOPOHUB_REGISTRY: ${{ env.JOOPOHUB_REGISTRY }}
        run: |
          set -euo pipefail
          mkdir -p .local
          if [[ -n "${PUBLISH_SCOPE}" ]]; then
            plan_args=(--selection-mode "${PUBLISH_SCOPE}")
            if [[ -n "${RELEASE_PLUGINS}" ]]; then
              plan_args+=(--plugins "${RELEASE_PLUGINS}")
            fi
            node --import tsx scripts/plugin-joopohub-release-plan.ts "${plan_args[@]}" > .local/plugin-joopohub-release-plan.json
          elif [[ -n "${BASE_REF}" ]]; then
            node --import tsx scripts/plugin-joopohub-release-plan.ts --base-ref "${BASE_REF}" --head-ref "${HEAD_REF}" > .local/plugin-joopohub-release-plan.json
          else
            node --import tsx scripts/plugin-joopohub-release-plan.ts > .local/plugin-joopohub-release-plan.json
          fi

          cat .local/plugin-joopohub-release-plan.json

          candidate_count="$(jq -r '.candidates | length' .local/plugin-joopohub-release-plan.json)"
          skipped_published_count="$(jq -r '.skippedPublished | length' .local/plugin-joopohub-release-plan.json)"
          has_candidates="false"
          if [[ "${candidate_count}" != "0" ]]; then
            has_candidates="true"
          fi
          matrix_json="$(jq -c '.candidates' .local/plugin-joopohub-release-plan.json)"

          {
            echo "candidate_count=${candidate_count}"
            echo "skipped_published_count=${skipped_published_count}"
            echo "has_candidates=${has_candidates}"
            echo "matrix=${matrix_json}"
          } >> "$GITHUB_OUTPUT"

          echo "Plugin release candidates:"
          jq -r '.candidates[]? | "- \(.packageName)@\(.version) [\(.publishTag)] from \(.packageDir)"' .local/plugin-joopohub-release-plan.json

          echo "Already published / skipped:"
          jq -r '.skippedPublished[]? | "- \(.packageName)@\(.version)"' .local/plugin-joopohub-release-plan.json

      - name: Fail manual publish when target versions already exist
        if: github.event_name == 'workflow_dispatch' && inputs.publish_scope == 'selected' && steps.plan.outputs.skipped_published_count != '0'
        run: |
          echo "::error::One or more selected plugin versions already exist on JoopoHub. Bump the version before running a real publish."
          exit 1

      - name: Verify Joopo JoopoHub package ownership
        if: steps.plan.outputs.has_candidates == 'true'
        env:
          JOOPOHUB_REGISTRY: ${{ env.JOOPOHUB_REGISTRY }}
        run: node --import tsx scripts/plugin-joopohub-owner-preflight.ts .local/plugin-joopohub-release-plan.json

  preview_plugin_pack:
    needs: preview_plugins_joopohub
    if: needs.preview_plugins_joopohub.outputs.has_candidates == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        plugin: ${{ fromJson(needs.preview_plugins_joopohub.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Checkout target revision
        env:
          TARGET_SHA: ${{ needs.preview_plugins_joopohub.outputs.ref_revision }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main \
            '+refs/heads/release/*:refs/remotes/origin/release/*'
          git checkout --detach "${TARGET_SHA}"

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "true"
          install-deps: "true"

      - name: Checkout JoopoHub CLI source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          repository: ${{ env.JOOPOHUB_REPOSITORY }}
          ref: main
          path: joopohub-source
          fetch-depth: 0

      - name: Checkout pinned JoopoHub CLI revision
        working-directory: joopohub-source
        env:
          JOOPOHUB_REF: ${{ env.JOOPOHUB_REF }}
        run: git checkout --detach "${JOOPOHUB_REF}"

      - name: Install JoopoHub CLI dependencies
        working-directory: joopohub-source
        run: bun install --frozen-lockfile

      - name: Bootstrap JoopoHub CLI
        run: |
          cat > "$RUNNER_TEMP/joopohub" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          exec bun "$GITHUB_WORKSPACE/joopohub-source/packages/joopohub/src/cli.ts" "$@"
          EOF
          chmod +x "$RUNNER_TEMP/joopohub"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Verify package-local runtime build
        run: node scripts/check-plugin-npm-runtime-builds.mjs --package "${{ matrix.plugin.packageDir }}"

      - name: Preview publish command
        env:
          JOOPOHUB_REGISTRY: ${{ env.JOOPOHUB_REGISTRY }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_COMMIT: ${{ needs.preview_plugins_joopohub.outputs.ref_revision }}
          SOURCE_REF: ${{ github.ref }}
          PACKAGE_TAG: ${{ matrix.plugin.publishTag }}
          PACKAGE_DIR: ${{ matrix.plugin.packageDir }}
        run: bash scripts/plugin-joopohub-publish.sh --dry-run "${PACKAGE_DIR}"

  publish_plugins_joopohub:
    needs: [preview_plugins_joopohub, preview_plugin_pack]
    if: github.event_name == 'workflow_dispatch' && needs.preview_plugins_joopohub.outputs.has_candidates == 'true'
    runs-on: ubuntu-latest
    environment: joopohub-plugin-release
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        plugin: ${{ fromJson(needs.preview_plugins_joopohub.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Checkout target revision
        env:
          TARGET_SHA: ${{ needs.preview_plugins_joopohub.outputs.ref_revision }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main \
            '+refs/heads/release/*:refs/remotes/origin/release/*'
          git checkout --detach "${TARGET_SHA}"

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "true"
          install-deps: "true"

      - name: Checkout JoopoHub CLI source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          repository: ${{ env.JOOPOHUB_REPOSITORY }}
          ref: main
          path: joopohub-source
          fetch-depth: 0

      - name: Checkout pinned JoopoHub CLI revision
        working-directory: joopohub-source
        env:
          JOOPOHUB_REF: ${{ env.JOOPOHUB_REF }}
        run: git checkout --detach "${JOOPOHUB_REF}"

      - name: Install JoopoHub CLI dependencies
        working-directory: joopohub-source
        run: bun install --frozen-lockfile

      - name: Bootstrap JoopoHub CLI
        run: |
          cat > "$RUNNER_TEMP/joopohub" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          exec bun "$GITHUB_WORKSPACE/joopohub-source/packages/joopohub/src/cli.ts" "$@"
          EOF
          chmod +x "$RUNNER_TEMP/joopohub"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Write JoopoHub token config
        env:
          JOOPOHUB_TOKEN: ${{ secrets.JOOPOHUB_TOKEN }}
          JOOPOHUB_REGISTRY: ${{ env.JOOPOHUB_REGISTRY }}
        run: |
          set -euo pipefail
          if [[ -z "${JOOPOHUB_TOKEN}" ]]; then
            echo "No JOOPOHUB_TOKEN secret configured; publish will rely on GitHub OIDC trusted publishing."
            exit 0
          fi
          node --input-type=module <<'EOF'
          import { writeFileSync } from "node:fs";
          import { join } from "node:path";

          const path = join(process.env.RUNNER_TEMP, "joopohub-config.json");
          writeFileSync(
            path,
            `${JSON.stringify(
              {
                registry: process.env.JOOPOHUB_REGISTRY,
                token: process.env.JOOPOHUB_TOKEN,
              },
              null,
              2,
            )}\n`,
          );
          console.log(path);
          EOF
          echo "JOOPOHUB_CONFIG_PATH=${RUNNER_TEMP}/joopohub-config.json" >> "$GITHUB_ENV"

      - name: Ensure version is not already published
        env:
          PACKAGE_NAME: ${{ matrix.plugin.packageName }}
          PACKAGE_VERSION: ${{ matrix.plugin.version }}
          JOOPOHUB_REGISTRY: ${{ env.JOOPOHUB_REGISTRY }}
        run: |
          set -euo pipefail
          encoded_name="$(node -e 'console.log(encodeURIComponent(process.env.PACKAGE_NAME ?? ""))')"
          encoded_version="$(node -e 'console.log(encodeURIComponent(process.env.PACKAGE_VERSION ?? ""))')"
          url="${JOOPOHUB_REGISTRY%/}/api/v1/packages/${encoded_name}/versions/${encoded_version}"
          status=""
          for attempt in $(seq 1 8); do
            status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "${url}")"
            if [[ "${status}" == "404" || "${status}" =~ ^2 ]]; then
              break
            fi
            if [[ "${status}" == "429" || "${status}" =~ ^5 ]]; then
              echo "JoopoHub availability check returned ${status} for ${PACKAGE_NAME}@${PACKAGE_VERSION}; retrying (${attempt}/8)."
              sleep 60
              continue
            fi
            break
          done
          if [[ "${status}" =~ ^2 ]]; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published on JoopoHub."
            exit 1
          fi
          if [[ "${status}" != "404" ]]; then
            echo "Unexpected JoopoHub response (${status}) for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Publish
        env:
          JOOPOHUB_REGISTRY: ${{ env.JOOPOHUB_REGISTRY }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_COMMIT: ${{ needs.preview_plugins_joopohub.outputs.ref_revision }}
          SOURCE_REF: ${{ github.ref }}
          PACKAGE_TAG: ${{ matrix.plugin.publishTag }}
          PACKAGE_DIR: ${{ matrix.plugin.packageDir }}
        run: bash scripts/plugin-joopohub-publish.sh --publish "${PACKAGE_DIR}"
