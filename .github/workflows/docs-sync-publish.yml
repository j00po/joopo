name: Docs Sync Publish Repo

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - scripts/docs-sync-publish.mjs
      - .github/workflows/docs-sync-publish.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-publish-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check docs publish repositories
        id: docs-repos
        env:
          GH_TOKEN: ${{ secrets.JOOPO_DOCS_SYNC_TOKEN || github.token }}
        run: |
          set -euo pipefail
          if gh repo view j00po/joopohub >/dev/null 2>&1 && gh repo view j00po/docs >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping docs publish sync: j00po/joopohub and/or j00po/docs is not available."
          fi

      - name: Checkout JoopoHub docs source
        if: steps.docs-repos.outputs.available == 'true'
        uses: actions/checkout@v6
        with:
          repository: j00po/joopohub
          path: joopohub-source
          fetch-depth: 1
          persist-credentials: false
          token: ${{ secrets.JOOPO_DOCS_SYNC_TOKEN || github.token }}

      - name: Setup Node
        if: steps.docs-repos.outputs.available == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Clone publish repo
        if: steps.docs-repos.outputs.available == 'true'
        env:
          JOOPO_DOCS_SYNC_TOKEN: ${{ secrets.JOOPO_DOCS_SYNC_TOKEN || github.token }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            rm -rf publish
            if git clone \
              "https://x-access-token:${JOOPO_DOCS_SYNC_TOKEN}@github.com/j00po/docs.git" \
              publish; then
              exit 0
            fi
            echo "Clone attempt ${attempt} failed; retrying."
            sleep $((attempt * 2))
          done

          echo "Failed to clone publish repo after retries." >&2
          exit 1

      - name: Sync docs into publish repo
        if: steps.docs-repos.outputs.available == 'true'
        run: |
          joopohub_sha="$(git -C "$GITHUB_WORKSPACE/joopohub-source" rev-parse HEAD)"
          node scripts/docs-sync-publish.mjs \
            --target "$GITHUB_WORKSPACE/publish" \
            --source-repo "$GITHUB_REPOSITORY" \
            --source-sha "$GITHUB_SHA" \
            --joopohub-repo "$GITHUB_WORKSPACE/joopohub-source" \
            --joopohub-source-repo "j00po/joopohub" \
            --joopohub-source-sha "$joopohub_sha"

      - name: Install docs MDX checker dependency
        if: steps.docs-repos.outputs.available == 'true'
        working-directory: publish
        run: npm install --no-save --package-lock=false @mdx-js/mdx@3.1.1

      - name: Check publish docs MDX
        if: steps.docs-repos.outputs.available == 'true'
        run: node "$GITHUB_WORKSPACE/publish/.joopo-sync/check-docs-mdx.mjs" "$GITHUB_WORKSPACE/publish/docs"

      - name: Commit publish repo sync
        if: steps.docs-repos.outputs.available == 'true'
        working-directory: publish
        run: |
          set -euo pipefail
          remote_source_sha() {
            git show refs/remotes/origin/main:.joopo-sync/source.json 2>/dev/null \
              | node -e 'const fs = require("node:fs"); try { const data = JSON.parse(fs.readFileSync(0, "utf8")); if (data.sha) process.stdout.write(data.sha); } catch {}' \
              || true
          }

          skip_stale_source() {
            current_source_sha="$(remote_source_sha)"
            if [ -z "$current_source_sha" ] || [ "$current_source_sha" = "$GITHUB_SHA" ]; then
              return
            fi

            if git -C "$GITHUB_WORKSPACE" merge-base --is-ancestor "$GITHUB_SHA" "$current_source_sha"; then
              echo "Skipping stale publish sync for $GITHUB_SHA; origin/main already mirrors $current_source_sha."
              exit 0
            fi
          }

          if git diff --quiet -- docs .joopo-sync; then
            echo "No publish-repo changes."
            exit 0
          fi

          if git fetch origin main:refs/remotes/origin/main; then
            skip_stale_source
          fi

          git config user.name "joopo-docs-sync[bot]"
          git config user.email "joopo-docs-sync[bot]@users.noreply.github.com"
          git add docs .joopo-sync
          git commit -m "chore(sync): mirror docs from $GITHUB_REPOSITORY@$GITHUB_SHA"
          for attempt in 1 2 3 4 5; do
            if git fetch origin main:refs/remotes/origin/main; then
              skip_stale_source
              if git rebase -X theirs origin/main && git push origin HEAD:main; then
                exit 0
              fi
            fi
            git rebase --abort >/dev/null 2>&1 || true
            echo "Publish sync attempt ${attempt} failed; retrying."
            sleep $((attempt * 2))
          done

          echo "Failed to push publish-repo sync after retries."
          exit 1
