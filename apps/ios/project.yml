name: Joopo
options:
  bundleIdPrefix: ai.joopo
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  JoopoKit:
    path: ../shared/JoopoKit
  Swabble:
    path: ../swabble

schemes:
  Joopo:
    shared: true
    build:
      targets:
        Joopo: all
    test:
      targets:
        - JoopoTests
        - JoopoLogicTests
  JoopoLogicTests:
    shared: true
    build:
      targets:
        JoopoLogicTests: all
    test:
      targets:
        - JoopoLogicTests

targets:
  Joopo:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: JoopoShareExtension
        embed: true
      - target: JoopoActivityWidget
        embed: true
      - target: JoopoWatchApp
      - package: JoopoKit
      - package: JoopoKit
        product: JoopoChatUI
      - package: JoopoKit
        product: JoopoProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../config/swiftformat" \
            --unexclude "$SRCROOT/Sources,$SRCROOT/ShareExtension,$SRCROOT/ActivityWidget,$SRCROOT/WatchExtension,$SRCROOT/../shared/JoopoKit,$SRCROOT/../swabble" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Joopo.entitlements
        CODE_SIGN_STYLE: "$(JOOPO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JOOPO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(JOOPO_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(JOOPO_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          JOOPO_PUSH_TRANSPORT: direct
          JOOPO_PUSH_DISTRIBUTION: local
          JOOPO_PUSH_RELAY_BASE_URL: ""
          JOOPO_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          JOOPO_PUSH_TRANSPORT: direct
          JOOPO_PUSH_DISTRIBUTION: local
          JOOPO_PUSH_RELAY_BASE_URL: ""
          JOOPO_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Joopo
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.joopo.ios
            CFBundleURLSchemes:
              - joopo
        CFBundleShortVersionString: "$(JOOPO_MARKETING_VERSION)"
        JoopoCanonicalVersion: "$(JOOPO_IOS_VERSION)"
        CFBundleVersion: "$(JOOPO_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.joopo.ios.bgrefresh
        NSLocalNetworkUsageDescription: Joopo discovers and connects to your Joopo gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _joopo-gw._tcp
        NSCameraUsageDescription: Joopo can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Joopo uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Joopo can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Joopo needs microphone access for voice wake.
        NSMotionUsageDescription: Joopo may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Joopo needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Joopo uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        JoopoPushTransport: "$(JOOPO_PUSH_TRANSPORT)"
        JoopoPushDistribution: "$(JOOPO_PUSH_DISTRIBUTION)"
        JoopoPushRelayBaseURL: "$(JOOPO_PUSH_RELAY_BASE_URL)"
        JoopoPushAPNsEnvironment: "$(JOOPO_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  JoopoShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: JoopoKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(JOOPO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JOOPO_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(JOOPO_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(JOOPO_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Joopo Share
        CFBundleShortVersionString: "$(JOOPO_MARKETING_VERSION)"
        CFBundleVersion: "$(JOOPO_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  JoopoActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/JoopoActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(JOOPO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JOOPO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(JOOPO_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Joopo Activity
        CFBundleShortVersionString: "$(JOOPO_MARKETING_VERSION)"
        CFBundleVersion: "$(JOOPO_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  JoopoWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: JoopoWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(JOOPO_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(JOOPO_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(JOOPO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JOOPO_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(JOOPO_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(JOOPO_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Joopo
        CFBundleShortVersionString: "$(JOOPO_MARKETING_VERSION)"
        CFBundleVersion: "$(JOOPO_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(JOOPO_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  JoopoWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(JOOPO_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(JOOPO_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(JOOPO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JOOPO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(JOOPO_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(JOOPO_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Joopo
        CFBundleShortVersionString: "$(JOOPO_MARKETING_VERSION)"
        CFBundleVersion: "$(JOOPO_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(JOOPO_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  JoopoTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Joopo
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(JOOPO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JOOPO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.joopo.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Joopo.app/Joopo"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: JoopoTests
        CFBundleShortVersionString: "$(JOOPO_MARKETING_VERSION)"
        CFBundleVersion: "$(JOOPO_BUILD_VERSION)"

  JoopoLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: JoopoKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(JOOPO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JOOPO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.joopo.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_EMIT_CONST_VALUE_PROTOCOLS: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: JoopoLogicTests
        CFBundleShortVersionString: "$(JOOPO_MARKETING_VERSION)"
        CFBundleVersion: "$(JOOPO_BUILD_VERSION)"
